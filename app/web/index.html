<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker MCP Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  header {
    background: #1a1d2e;
    border-bottom: 1px solid #2d3748;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header .badge { background: #2d6a4f; color: #52b788; font-size: 11px; padding: 2px 8px; border-radius: 99px; }

  .container { max-width: 1000px; margin: 0 auto; padding: 32px; }

  /* Auth banner */
  #auth-banner {
    background: #1a1d2e;
    border: 1px solid #2d3748;
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
  }
  #auth-banner h2 { margin-bottom: 12px; font-size: 15px; color: #94a3b8; }
  .input-row { display: flex; gap: 10px; }
  input[type=text], input[type=password], input[type=number], select {
    background: #0f1117;
    border: 1px solid #2d3748;
    color: #e2e8f0;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  input:focus, select:focus { border-color: #4299e1; }
  .input-row input { flex: 1; }

  /* Buttons */
  button {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: opacity .2s, transform .1s;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #2563eb; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover:not(:disabled) { background: #dc2626; }
  .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #2d3748; }
  .btn-ghost:hover { background: #1a1d2e; }

  /* Servers */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-header h2 { font-size: 17px; font-weight: 600; }

  .server-list { display: flex; flex-direction: column; gap: 12px; }

  .server-card {
    background: #1a1d2e;
    border: 1px solid #2d3748;
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .server-icon {
    width: 40px; height: 40px;
    background: #2d3748;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .server-info { flex: 1; }
  .server-name { font-weight: 600; margin-bottom: 4px; }
  .server-meta { font-size: 12px; color: #64748b; display: flex; gap: 10px; flex-wrap: wrap; }
  .tag {
    background: #1e3a5f;
    color: #60a5fa;
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 99px;
  }
  .auth-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    background: #2d3748;
    color: #94a3b8;
  }

  /* Add server form */
  #add-form {
    background: #1a1d2e;
    border: 1px solid #3b82f6;
    border-radius: 10px;
    padding: 24px;
    margin-top: 16px;
    display: none;
  }
  #add-form h3 { margin-bottom: 16px; font-size: 15px; color: #94a3b8; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; }
  .form-group input, .form-group select { width: 100%; }
  .form-group.full { grid-column: 1 / -1; }
  .form-actions { margin-top: 16px; display: flex; gap: 10px; justify-content: flex-end; }

  /* Pub key display */
  #pubkey-box {
    margin-top: 16px;
    background: #0f1117;
    border: 1px solid #2d6a4f;
    border-radius: 8px;
    padding: 16px;
    display: none;
  }
  #pubkey-box h4 { color: #52b788; margin-bottom: 8px; font-size: 13px; }
  #pubkey-box pre {
    font-size: 12px;
    color: #a3e7b7;
    white-space: pre-wrap;
    word-break: break-all;
    background: #0a0e12;
    padding: 12px;
    border-radius: 6px;
  }

  /* Empty state */
  .empty { text-align: center; padding: 48px; color: #475569; }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }

  /* Alerts */
  .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
  .alert-error { background: #3b1212; border: 1px solid #7f1d1d; color: #fca5a5; }
  .alert-success { background: #0f2e1f; border: 1px solid #1a4731; color: #6ee7b7; }

  #status { margin-bottom: 16px; }
</style>
</head>
<body>

<header>
  <span style="font-size:22px">🐳</span>
  <h1>Docker MCP Hub</h1>
  <span class="badge">Web UI</span>
</header>

<div class="container">

  <!-- Auth -->
  <div id="auth-banner">
    <h2>🔑 Admin Token</h2>
    <div class="input-row">
      <input type="password" id="token-input" placeholder="Enter admin / web UI token..." />
      <button class="btn-primary" onclick="loadServers()">Connect</button>
    </div>
  </div>

  <div id="status"></div>

  <!-- Servers -->
  <div id="servers-section" style="display:none">
    <div class="section-header">
      <h2>Remote Hosts</h2>
      <button class="btn-primary" onclick="toggleAddForm()">＋ Add Server</button>
    </div>

    <div id="server-list" class="server-list"></div>

    <!-- Add form -->
    <div id="add-form">
      <h3>Add Remote Docker Host</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="f-name" placeholder="prod-01" />
        </div>
        <div class="form-group">
          <label>Host / IP</label>
          <input type="text" id="f-host" placeholder="192.168.1.10" />
        </div>
        <div class="form-group">
          <label>SSH Port</label>
          <input type="number" id="f-port" value="22" />
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="f-user" placeholder="ubuntu" />
        </div>
        <div class="form-group full">
          <label>Auth Type</label>
          <select id="f-auth" onchange="onAuthTypeChange()">
            <option value="password">Password</option>
            <option value="key_path">Existing SSH Key (path inside container)</option>
            <option value="generate_key">Generate New SSH Key</option>
          </select>
        </div>
        <div class="form-group full" id="f-password-row">
          <label>Password</label>
          <input type="password" id="f-password" placeholder="SSH password" />
        </div>
        <div class="form-group full" id="f-keypath-row" style="display:none">
          <label>Key Path (inside container)</label>
          <input type="text" id="f-keypath" placeholder="/keys/my_key" />
        </div>
        <div class="form-group full">
          <label>Description (optional)</label>
          <input type="text" id="f-desc" placeholder="Production server, EU-West" />
        </div>
        <div class="form-group full">
          <label>Tags (comma-separated)</label>
          <input type="text" id="f-tags" placeholder="prod, docker, web" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-ghost" onclick="toggleAddForm()">Cancel</button>
        <button class="btn-primary" onclick="submitAddServer()">Add Server</button>
      </div>

      <div id="pubkey-box">
        <h4>✅ SSH Key Generated — add this public key to the remote host</h4>
        <pre id="pubkey-text"></pre>
        <p style="font-size:12px;color:#64748b;margin-top:8px">
          Run on the remote host: <code style="color:#60a5fa">echo "PUBKEY" >> ~/.ssh/authorized_keys</code>
        </p>
      </div>
    </div>
  </div>

</div>

<script>
  const api = (path, opts = {}) => {
    const token = document.getElementById('token-input').value.trim();
    return fetch(path, {
      ...opts,
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) },
    });
  };

  function showStatus(msg, type = 'error') {
    document.getElementById('status').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => { document.getElementById('status').innerHTML = ''; }, 4000);
  }

  async function loadServers() {
    const res = await api('/api/servers');
    if (!res.ok) { showStatus('Auth failed — check your token'); return; }
    const servers = await res.json();
    document.getElementById('servers-section').style.display = '';
    renderServers(servers);
  }

  function renderServers(servers) {
    const el = document.getElementById('server-list');
    if (!servers.length) {
      el.innerHTML = '<div class="empty"><div class="icon">🖥️</div><div>No servers yet — add one above</div></div>';
      return;
    }
    el.innerHTML = servers.map(s => `
      <div class="server-card">
        <div class="server-icon">🖥️</div>
        <div class="server-info">
          <div class="server-name">${s.name}</div>
          <div class="server-meta">
            <span>${s.username}@${s.host}:${s.port}</span>
            <span class="auth-badge">${s.auth_type}</span>
            ${(s.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          ${s.description ? `<div style="font-size:12px;color:#475569;margin-top:4px">${s.description}</div>` : ''}
        </div>
        <div style="font-size:12px;color:#475569;font-family:monospace">${s.id}</div>
        <button class="btn-danger" onclick="deleteServer('${s.id}','${s.name}')">Remove</button>
      </div>
    `).join('');
  }

  async function deleteServer(id, name) {
    if (!confirm(`Remove server "${name}"?`)) return;
    const res = await api(`/api/servers/${id}`, { method: 'DELETE' });
    if (res.ok) { showStatus(`Server "${name}" removed`, 'success'); loadServers(); }
    else { showStatus('Delete failed'); }
  }

  function toggleAddForm() {
    const f = document.getElementById('add-form');
    f.style.display = f.style.display === 'none' ? '' : 'none';
    document.getElementById('pubkey-box').style.display = 'none';
  }

  function onAuthTypeChange() {
    const v = document.getElementById('f-auth').value;
    document.getElementById('f-password-row').style.display = v === 'password' ? '' : 'none';
    document.getElementById('f-keypath-row').style.display = v === 'key_path' ? '' : 'none';
  }

    async function submitAddServer() {
    const authType = document.getElementById('f-auth').value;
    const body = {
      name: document.getElementById('f-name').value.trim(),
      host: document.getElementById('f-host').value.trim(),
      port: parseInt(document.getElementById('f-port').value) || 22,
      username: document.getElementById('f-user').value.trim(),
      auth_type: authType,
      description: document.getElementById('f-desc').value.trim() || null,
      tags: document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean),
    };
    
    // Валидация
    if (!body.name || !body.host || !body.username) {
      showStatus('Please fill in all required fields (Name, Host, Username)');
      return;
    }
    
    if (authType === 'password') {
      const pwd = document.getElementById('f-password').value;
      if (!pwd) {
        showStatus('Password is required for password authentication');
        return;
      }
      body.password = pwd;
    }
    if (authType === 'key_path') {
      const kp = document.getElementById('f-keypath').value.trim();
      if (!kp) {
        showStatus('Key path is required for key_path authentication');
        return;
      }
      body.key_path = kp;
    }

        try {
      const res = await api('/api/servers', { method: 'POST', body: JSON.stringify(body) });
      if (!res.ok) { 
        const err = await res.json();
        showStatus(err.detail || 'Error adding server'); 
        return; 
      }
      const data = await res.json();

      if (data.auth_type === 'generate_key' && data.description) {
        const match = data.description.match(/\[PUBLIC KEY[^\]]*\]:\n([\s\S]+)$/);
        if (match) {
          document.getElementById('pubkey-text').textContent = match[1].trim();
          document.getElementById('pubkey-box').style.display = '';
        }
      } else {
        toggleAddForm();
      }

      showStatus(`Server "${data.name}" added (ID: ${data.id})`, 'success');
      loadServers();
    } catch (err) {
      showStatus('Network error: ' + err.message);
    }
  }
</script>
</body>
</html>
