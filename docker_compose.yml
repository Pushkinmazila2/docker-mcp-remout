services:
  # HashiCorp Vault - Secure secrets storage
  vault:
    image: hashicorp/vault:1.15
    container_name: docker-mcp-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    volumes:
      - ./vault/data:/vault/data
      - ./vault/config:/vault/config
      - ./vault/logs:/vault/logs
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "http://0.0.0.0:8200"
      VAULT_DEV_ROOT_TOKEN_ID: "root-token-change-me"  # !! Change in production !!
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp-hub:
    build: .
    image: docker-mcp-hub:latest
    container_name: docker-mcp-hub
    restart: unless-stopped
    depends_on:
      vault:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data        # servers.json (fallback)
      - ./keys:/keys        # SSH ключи
    environment:
      # !! Обязательно смените токены перед деплоем !!
      MCP_USER_TOKEN: "user-read-only-token"
      MCP_ADMIN_TOKEN: "admin-full-access-token"
      WEB_UI_TOKEN: "webui-token"
      DATA_DIR: /data
      KEYS_DIR: /keys
      
      # Vault Configuration - HashiCorp Vault by default
      VAULT_TYPE: "hashicorp"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root-token-change-me"  # !! Change in production !!
      VAULT_SECRET_PATH: "secret/data/docker-mcp-hub"
      
      # To use Local File Storage instead, set:
      # VAULT_TYPE: "local"
      
      # To use AWS Secrets Manager instead, set:
      # VAULT_TYPE: "aws"
      # AWS_SECRET_NAME: "docker-mcp-hub/master-keys"
      # AWS_REGION: "us-east-1"
      # AWS_ACCESS_KEY_ID: "your-access-key"
      # AWS_SECRET_ACCESS_KEY: "your-secret-key"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3