name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'SECURITY.md'
      - '.env'
      - '.env.example'
      - '**.md' 
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      packages: write
      security-events: write # Нужно для публикации отчетов во вкладку Security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # 1. Собираем образ локально
      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: local-scan-target:test

            # 2. Сканируем и сохраняем результат в файл (простой текстовый формат)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-scan-target:test'
          format: 'table'
          output: 'trivy-report.md' # Пишем таблицу прямо в файл
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # 3. Оборачиваем таблицу в блоки кода Markdown для красоты
      - name: Format Report
        run: |
          sed -i '1i ```text' trivy-report.md
          echo '```' >> trivy-report.md

      # 4. Записываем результат в SECURITY.md
      - name: Update SECURITY.md
        run: |
          sed -i '/<!-- TRIVY_START -->/,/<!-- TRIVY_END -->/{//!d}' SECURITY.md
          sed -i '/<!-- TRIVY_START -->/r trivy-report.md' SECURITY.md

      # 5. Коммитим изменения в SECURITY.md (опционально)
      - name: Commit Security Report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add SECURITY.md
          git commit -m "chore: update security report [skip ci]" || echo "No changes"
          git push

      # 6. Теперь пушим сам образ
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
