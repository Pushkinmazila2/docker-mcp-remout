name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # Нужно для публикации отчетов во вкладку Security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # 1. Сначала просто собираем образ локально (без пуша)
      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true # Загружает образ в локальный Docker daemon для сканирования
          tags: local-scan-target:test

      # 2. Сканируем образ на наличие уязвимостей
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-scan-target:test'
          format: 'table'
          exit-code: '1' # Прервать сборку, если найдены уязвимости
          ignore-unfixed: true # Игнорировать CVE, для которых еще нет патча
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 3. Если сканирование прошло успешно — пушим в реестр
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
