services:
  mcp-docker-manager:
    image: ghcr.io/pushkinmazila2/docker-mcp-remote:latest
    container_name: mcp-docker-manager
    restart: unless-stopped
    
    ports:
      - "8000:8000"
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - SERVER_HOST=${SERVER_HOST}
      - SERVER_PORT=${SERVER_HOST:-8000}
      - SAFE_MOUNT_DIR==${SAFE_MOUNT_DIR:-"/app/data"}
      - EXEC_WHITELIST=cd,ls,ps,df,du,top,free,uptime,tail,cat,grep,node

    privileged: false
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run
      
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(); s.connect(('127.0.0.1', 8000))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
